name: Sécurité

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-et-audit:
    name: ESLint + npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances (verrouillées)
        run: npm ci --legacy-peer-deps

      - name: Linter (ESLint security)
        run: npx eslint .

      - name: Auditer les dépendances (échoue si faille >= high)
        run: npm audit --audit-level=high


  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4


      - name: Scanner (règles auto + règle maison sqli)
run: semgrep scan --config auto --config regles/sqli.yml --error --exclude-rule generic.secrets.security.detected-bcrypt-hash.detected-bcrypt-hash

